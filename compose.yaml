services:
  app:
    build:
      context: .
    image: greenloop-document-analyst:local
    ports:
      - "8501:8501"
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_MODEL: qwen3:8b
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_THINK: "false"
      OLLAMA_KEEP_ALIVE: 30m
      LLM_TEMPERATURE: "0.1"
      LLM_MAX_TOKENS: "400"
      LLM_NUM_CTX: "3072"
      RAG_PIPELINE_MODE: fast
      STRICT_LLM_VERIFICATION: "false"
      RAG_ANSWER_CACHE: "true"
      RAG_TOP_K_VECTOR: "4"
      RAG_TOP_K_BM25: "4"
      RAG_FINAL_CONTEXT_CHUNKS: "4"
      RAG_MAX_CONTEXT_CHARS: "7000"
      KNOWLEDGE_DIR: /app/knowledge
      CHROMA_PERSIST_DIR: /app/storage/chroma
      OUTPUT_DIR: /app/output
      RAG_ANSWER_CACHE_DIR: /app/storage/answer_cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./output:/app/output
      - ./storage/chroma:/app/storage/chroma
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
